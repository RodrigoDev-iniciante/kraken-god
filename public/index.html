<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ordem do Kraken</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="loader">
    <video autoplay muted loop id="loaderVideo">
        <source src="assets/loading.mp4" type="video/mp4">
    </video>

    <div class="loaderOverlay">
        <h1>ORDEM DO KRAKEN</h1>
        <p>Inicializando sistema da guild...</p>
    </div>
</div>

<div class="backgroundOverlay"></div>

<audio autoplay loop>
    <source src="assets/ambient.mp3" type="audio/mp3">
</audio>

<section class="hero cinematicFade">

    <div class="navbar">
        <div class="logo">
            🐙 ORDEM DO KRAKEN
        </div>

        <div class="menu">
            <a href="#">INÍCIO</a>
            <a href="#">RANKING</a>
            <a href="#">TEMPORADA</a>
            <a href="#">DISCORD</a>
            <a href="#">PAINEL</a>
        </div>
    </div>

    <div class="card">

        <h1>🐙 ORDEM DO KRAKEN</h1>

        <p class="subtitle">
            A guild mais dominante do servidor.
        </p>

        <div class="seasonBox">
            TEMPORADA 01 • RECRUTAMENTO ABERTO
        </div>

        <form id="applyForm">

            <input id="nick" type="text" placeholder="Nick do jogador" required>

            <input id="damage" type="number" placeholder="Damage total" required>

            <input id="hours" type="number" placeholder="Horas jogadas por dia" required>

            <input id="bounty" type="number" placeholder="Bounty" required>

            <button type="submit">
                ⚔ ENTRAR PARA O KRAKEN
            </button>

        </form>

        <div id="result"></div>

        <div class="stats">

            <div class="statBox">
                <h2>257</h2>
                <p>Membros</p>
            </div>

            <div class="statBox">
                <h2>98%</h2>
                <p>Taxa Win</p>
            </div>

            <div class="statBox">
                <h2>S+</h2>
                <p>Rank Guild</p>
            </div>

        </div>

    </div>

</section>

<script src="js/particles.js"></script>
<script src="js/cinematic.js"></script>
<script src="js/audio.js"></script>
<script src="js/loader.js"></script>
<script src="js/script.js"></script>

</body>
</html>
